{% extends "base.html" %}

{% block title %}Produtos - DogMau Auto Center{% endblock %}

{% block extra_head %}
<style>
    .produtos-hero {
        background: linear-gradient(135deg, #c02525 0%, #8a1a1a 100%);
        padding: 60px 20px;
        text-align: center;
        color: white;
        margin-bottom: 40px;
    }

    .produtos-hero h1 {
        font-family: 'Orbitron', sans-serif;
        font-size: 3em;
        font-weight: bold;
        margin-bottom: 15px;
    }

    .produtos-hero p {
        font-size: 1.2em;
        opacity: 0.9;
    }

    .produtos-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 30px;
        padding: 40px 20px;
    }

    .produto-card {
        background: #222;
        border-radius: 12px;
        overflow: hidden;
        transition: transform 0.3s, box-shadow 0.3s;
        border: 2px solid #333;
        display: flex;
        flex-direction: column;
        height: 100%;
    }

    .produto-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 24px rgba(192, 37, 43, 0.3);
        border-color: #c02525;
    }

    .produto-imagem {
        width: 100%;
        height: 220px;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }

    .produto-imagem img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .produto-imagem-placeholder {
        font-size: 4em;
        color: #444;
    }

    .produto-info {
        padding: 20px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }

    .produto-nome {
        font-size: 1.3em;
        font-weight: bold;
        color: white;
        margin-bottom: 10px;
        line-height: 1.3;
    }

    .produto-descricao {
        font-size: 0.9em;
        color: #aaa;
        margin-bottom: 15px;
        flex-grow: 1;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .produto-estoque {
        font-size: 0.85em;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .estoque-badge {
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: bold;
    }

    .estoque-disponivel {
        background: rgba(76, 175, 80, 0.2);
        color: #4caf50;
    }

    .estoque-baixo {
        background: rgba(255, 152, 0, 0.2);
        color: #ffa500;
    }

    .estoque-indisponivel {
        background: rgba(244, 67, 54, 0.2);
        color: #f44336;
    }

    .produto-preco {
        font-size: 1.8em;
        color: #c02525;
        font-weight: bold;
        margin-bottom: 15px;
    }

    .produto-acoes {
        display: flex;
        gap: 10px;
    }

    .btn-comprar {
        flex-grow: 1;
        background: #c02525;
        border: none;
        color: white;
        font-weight: bold;
        padding: 10px 15px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-comprar:hover {
        background: #8a1a1a;
    }

    .btn-comprar:disabled {
        background: #555;
        cursor: not-allowed;
        opacity: 0.6;
    }

    .btn-carrinho {
        background: transparent;
        border: 2px solid #c02525;
        color: #c02525;
        padding: 8px 15px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 45px;
    }

    .btn-carrinho:hover {
        background: #c02525;
        color: white;
    }

    .btn-carrinho i {
        font-size: 1.3em;
    }

    .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 400px;
    }

    .spinner-border {
        color: #c02525;
    }

    .error-message {
        background: #f44336;
        color: white;
        padding: 20px;
        border-radius: 8px;
        margin: 20px;
        text-align: center;
    }

    .cart-toggle-header {
        position: relative;
    }

    .cart-badge {
        position: absolute;
        top: -8px;
        right: -8px;
        background: #c02525;
        color: white;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75em;
        font-weight: bold;
    }
</style>
{% endblock %}

{% block content %}
<div class="produtos-hero">
    <h1>Catálogo de Produtos</h1>
    <p>Qualidade e excelência em peças automotivas</p>
</div>

<div class="container">
    <div id="produtos-list" class="produtos-container">
        <div class="loading">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/cart.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const produtosList = document.getElementById('produtos-list');

    try {
        const response = await fetch('/api/produtos');
        if (!response.ok) {
            throw new Error(`Erro ${response.status}: ${response.statusText}`);
        }

        const produtos = await response.json();

        if (!Array.isArray(produtos) || produtos.length === 0) {
            produtosList.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #aaa;">Nenhum produto disponível no momento</div>';
            return;
        }

        produtosList.innerHTML = produtos.map(produto => {
            const estoque = produto.quantidade_estoque || 0;
            const temEstoque = estoque > 0;

            let estoqueClass = 'estoque-disponivel';
            let estoqueTexto = `Em estoque (${estoque})`;

            if (estoque === 0) {
                estoqueClass = 'estoque-indisponivel';
                estoqueTexto = 'Indisponível';
            } else if (estoque <= 5) {
                estoqueClass = 'estoque-baixo';
                estoqueTexto = `Apenas ${estoque} em estoque`;
            }

            return `
                <div class="produto-card">
                    <div class="produto-imagem">
                        ${produto.imagem_produto ? 
                            `<img src="${produto.imagem_produto}" alt="${produto.nome}">` :
                            '<div class="produto-imagem-placeholder"><i class="bi bi-box"></i></div>'
                        }
                    </div>

                    <div class="produto-info">
                        <h3 class="produto-nome">${produto.nome}</h3>
                        <p class="produto-descricao">${produto.descricao || 'Produto de qualidade para seu veículo'}</p>

                        <div class="produto-estoque">
                            <span class="estoque-badge ${estoqueClass}">${estoqueTexto}</span>
                        </div>

                        <div class="produto-preco">
                            R$ ${parseFloat(produto.preco).toFixed(2).replace('.', ',')}
                        </div>

                        <div class="produto-acoes">
                            <button 
                                class="btn-comprar" 
                                onclick="comprarProduto(${produto.id_produto}, '${produto.nome.replace(/'/g, "\\'")}', ${produto.preco})"
                                ${!temEstoque ? 'disabled' : ''}
                            >
                                <i class="bi bi-bag-check"></i>
                                ${temEstoque ? 'Comprar' : 'Indisponível'}
                            </button>
                            <button 
                                class="btn-carrinho" 
                                onclick="addToCart({id_produto: ${produto.id_produto}, nome: '${produto.nome.replace(/'/g, "\\'")}', preco: ${produto.preco}, imagem_produto: '${produto.imagem_produto || ''}'${!temEstoque ? ', disabled: true' : ''}})"
                                ${!temEstoque ? 'disabled' : ''}
                                title="Adicionar ao carrinho"
                            >
                                <i class="bi bi-cart-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

    } catch (error) {
        console.error('Erro ao carregar produtos:', error);
        produtosList.innerHTML = `
            <div style="grid-column: 1/-1;">
                <div class="error-message">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    Erro ao carregar produtos. Por favor, tente novamente mais tarde.
                </div>
            </div>
        `;
    }
});

// Função para comprar diretamente (pode redirecionar para checkout com o produto)
function comprarProduto(id_produto, nome, preco) {
    // Verifica se está logado
    const userLoggedIn = {% if user %}true{% else %}false{% endif %};
    
    if (!userLoggedIn) {
        // Redireciona para login com volta ao carrinho
        window.location.href = '/login?next=/checkout';
        return;
    }

    if (window.cart) {
        window.cart.addProduct({
            id_produto,
            nome,
            preco,
            quantidade: 1
        });
        // Abre o carrinho
        window.cart.toggleCart();
    }
}

// Função para adicionar ao carrinho com verificação de login
function addToCartWithLogin(produtoData) {
    // Verifica se está logado
    const userLoggedIn = {% if user %}true{% else %}false{% endif %};
    
    if (!userLoggedIn) {
        // Redireciona para login
        window.location.href = '/login?next=/produtos';
        return;
    }

    // Se está logado, adiciona ao carrinho
    if (window.cart) {
        window.cart.addProduct(produtoData);
    }
}
</script>
{% endblock %}
