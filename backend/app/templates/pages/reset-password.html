<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Redefinir Senha - Dog Mau AutoCenter</title>
    // vcs arrumam dps pq eu nao sou front e nao vou me dar o trabalho de fazer isso direito

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap"
        rel="stylesheet"
    >

    <style>
        body {
            background-color: #0b0b0b;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-card {
            width: 100%;
            max-width: 420px;
            background-color: #111;
            border: 1px solid #222;
            border-radius: 16px;
        }

        .form-control {
            background-color: #0b0b0b !important;
            border: 1px solid #333 !important;
            color: white !important;
        }

        .form-control:focus {
            border-color: rgba(192, 37, 43) !important;
            box-shadow: 0 0 0 .2rem rgba(192, 37, 43, .25);
        }

        .btn-primary {
            background-color: rgba(192, 37, 43);
            border: none;
        }

        .btn-primary:hover {
            background-color: rgb(170, 30, 35);
        }
    </style>
</head>

<body>

<div class="card reset-card shadow p-4">

    <div class="text-center mb-4">
        <h2
            class="fw-bold"
            style="color: rgba(192, 37, 43); font-family: 'Orbitron', sans-serif;"
        >
            Redefinir Senha
        </h2>

        <p class="text-secondary small mb-0">
            Digite sua nova senha abaixo.
        </p>
    </div>

    <form id="resetPasswordForm">

        <input
            type="hidden"
            id="token"
            value="{{ token }}"
        >

        <div class="form-floating mb-3">
            <input
                type="password"
                class="form-control"
                id="novaSenha"
                placeholder="Nova senha"
                required
            >

            <label for="novaSenha">
                Nova senha
            </label>
        </div>

        <div class="form-floating mb-3">
            <input
                type="password"
                class="form-control"
                id="confirmarSenha"
                placeholder="Confirmar senha"
                required
            >

            <label for="confirmarSenha">
                Confirmar senha
            </label>
        </div>

        <div
            id="errorBox"
            class="alert alert-danger d-none small"
        ></div>

        <div
            id="successBox"
            class="alert alert-success d-none small"
        ></div>

        <button
            type="submit"
            id="submitButton"
            class="btn btn-primary w-100 py-2"
        >
            Redefinir senha
        </button>

    </form>

</div>

<script src="/static/js/reset_password.js"></script>

</body>
</html>
