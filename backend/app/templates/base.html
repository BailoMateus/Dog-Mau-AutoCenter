<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DogMau Auto Center{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=1.2">
    <meta name="current-user-id" content="{{ user.user_id if user else '' }}">
    {% block extra_head %}{% endblock %}
</head>
<body class="d-flex flex-column" {% block body_attrs %}{% endblock %}>

    {% block header %}
    {% include "partials/header.html" %}
    {% endblock %}

    {% block main %}
    <main class="flex-grow-1">
        {% block content %}{% endblock %}
    </main>
    {% endblock %}

    {% block footer %}
    {% include "partials/footer.html" %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="/static/js/auth-interceptor.js"></script>
    <script src="/static/js/compra.js"></script>
    <script src="/static/js/cart.js"></script>
    <script src="/static/js/profile-edit.js"></script>
    <script src="/static/js/ui-components.js"></script>
    <script src="/static/js/password-change.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
