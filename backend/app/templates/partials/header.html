<header class="py-3">
  <div class="container">
    <div class="d-flex align-items-center justify-content-between">
      <a href="/" class="d-flex align-items-center text-decoration-none">
        <img src="/static/assets/logo.png" class="me-2" id="logo" alt="Dog Mau logo" style="border-radius: 50%; width: 50px; height: 50px;" />
      </a>

      <ul class="nav mx-auto mb-0">
        <li><a href="/" class="nav-link px-4 fs-4 {% if page == 'home' %}active{% endif %}">Home</a></li>
        <li><a href="#" class="nav-link px-4 fs-4 {% if page == 'produtos' %}active{% endif %}">Produtos</a></li>
        <li><a href="/servicos" class="nav-link px-4 fs-4 {% if page == 'servicos' %}active{% endif %}">Serviços</a></li>
        <li><a href="#" class="nav-link px-4 fs-4 {% if page == 'sobre' %}active{% endif %}">Sobre</a></li>
      </ul>

      <div class="d-flex align-items-center gap-3">
        <form class="search-box d-flex align-items-center">
            <input type="search" class="form-control search-input" placeholder="Buscar..." />
            <button class="btn btn-danger ms-2" type="button">
                <i class="bi bi-search"></i>
            </button>
        </form>
        <div class="d-flex align-items-center gap-3 ms-2">
          {% if user %}
          <div class="d-flex align-items-center gap-2">
            {% if user.role == 'admin' %}
            <a href="/painel" class="btn btn-primary"><i class="bi bi-speedometer2 me-1"></i>Painel de Gestão</a>
            {% elif user.role == 'mecanico' %}
            <a href="/painel" class="btn btn-warning text-dark"><i class="bi bi-tools me-1"></i>Painel Operacional</a>
            {% else %}
            <a href="/painel" class="btn btn-outline-primary"><i class="bi bi-person-fill me-1"></i>Minha Área</a>
            {% endif %}
            <a href="/logout" class="btn btn-outline-danger" title="Sair"><i class="bi bi-box-arrow-right"></i> Sair</a>
          </div>
          {% else %}
          <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle fs-4 me-2"></i>
              <span class="fw-semibold">Login</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/login">Entrar</a></li>
              <li><a class="dropdown-item" href="/cadastro">Cadastrar</a></li>
            </ul>
          </div>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</header>
