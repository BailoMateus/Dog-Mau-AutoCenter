{# Partial: Gerenciamento de Ordens de Serviço (admin / mecânico) #}

<div id="osPainelRoot"
     data-current-user-id="{{ user.user_id }}"
     data-current-user-role="{{ user.role }}">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <h2 class="fw-bold m-0" style="color: rgba(192, 37, 43); font-family: 'Orbitron', sans-serif;">
            <i class="bi bi-wrench-adjustable-circle me-2"></i>Ordens de Serviço
        </h2>
        <button type="button" class="btn btn-outline-light btn-sm" id="osBtnRecarregar">
            <i class="bi bi-arrow-clockwise me-1"></i>Atualizar
        </button>
    </div>

    <div id="osAlertContainer" class="mb-3"></div>

    <div class="filtro-form card border-0 shadow rounded mb-4 p-3" style="background-color: #111;">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="text-muted small" for="osFiltroBusca">Busca</label>
                <input type="text" id="osFiltroBusca" class="form-control text-white"
                       style="background-color: #0b0b0b; border-color: #333;"
                       placeholder="ID, placa, cliente...">
            </div>
            <div class="col-md-2">
                <label class="text-muted small" for="osFiltroStatus">Status</label>
                <select id="osFiltroStatus" class="form-select text-white"
                        style="background-color: #0b0b0b; border-color: #333;">
                    <option value="">Todos</option>
                    <option value="aberta">Aberta</option>
                    <option value="em_andamento">Em andamento</option>
                    <option value="aguardando_peca">Aguardando peça</option>
                    <option value="concluida">Concluída</option>
                    <option value="cancelada">Cancelada</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="text-muted small" for="osFiltroResponsavel">Responsável</label>
                <select id="osFiltroResponsavel" class="form-select text-white"
                        style="background-color: #0b0b0b; border-color: #333;">
                    <option value="">Todos</option>
                    <option value="0">Sem responsável</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="text-muted small" for="osFiltroCliente">Cliente</label>
                <select id="osFiltroCliente" class="form-select text-white"
                        style="background-color: #0b0b0b; border-color: #333;">
                    <option value="">Todos</option>
                    {% for u in usuarios %}
                    {% if u.role == 'cliente' %}
                    <option value="{{ u.id_usuario }}">{{ u.nome }}</option>
                    {% endif %}
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-1">
                <label class="text-muted small" for="osFiltroDataInicio">De</label>
                <input type="date" id="osFiltroDataInicio" class="form-control text-white"
                       style="background-color: #0b0b0b; border-color: #333;">
            </div>
            <div class="col-md-1">
                <label class="text-muted small" for="osFiltroDataFim">Até</label>
                <input type="date" id="osFiltroDataFim" class="form-control text-white"
                       style="background-color: #0b0b0b; border-color: #333;">
            </div>
            <div class="col-md-1">
                <button type="button" class="btn btn-primary w-100" id="osBtnFiltrar">
                    <i class="bi bi-funnel me-1"></i>Filtrar
                </button>
            </div>
        </div>
    </div>

    <div id="osLoader" class="text-center py-5">
        <div class="spinner-border" style="color: rgba(192, 37, 43);" role="status">
            <span class="visually-hidden">Carregando...</span>
        </div>
        <p class="mt-3 text-muted">Carregando ordens de serviço...</p>
    </div>

    <div id="osEmpty" class="text-center py-5 text-muted" style="display: none;">
        <i class="bi bi-inbox display-4 d-block mb-3"></i>
        <p class="mb-0">Nenhuma ordem de serviço encontrada.</p>
    </div>

    <div id="osError" class="alert alert-danger" style="display: none;"></div>

    <div id="osTableWrap" class="table-responsive rounded shadow card p-0 border-0" style="background-color: #111; display: none;">
        <table class="table table-dark table-hover align-middle mb-0" style="background-color: transparent;">
            <thead class="table-dark text-uppercase small" style="border-bottom: 2px solid #222;">
                <tr>
                    <th class="py-3">OS</th>
                    <th class="py-3">Veículo</th>
                    <th class="py-3 d-none d-lg-table-cell">Cliente</th>
                    <th class="py-3">Responsável</th>
                    <th class="py-3">Status</th>
                    <th class="py-3 d-none d-md-table-cell">Abertura</th>
                    <th class="py-3">Valor</th>
                    <th class="text-center py-3">Ações</th>
                </tr>
            </thead>
            <tbody id="osTableBody"></tbody>
        </table>
    </div>
</div>

<!-- Modal atribuir responsável -->
<div id="osAtribuirModal" class="custom-modal d-none">
    <div class="custom-modal-content rounded shadow card p-0" style="background-color: #111; border: 1px solid #222; max-width: 480px;">
        <div class="custom-modal-header border-bottom border-secondary p-3 d-flex justify-content-between align-items-center">
            <h5 class="m-0 fw-bold" style="color: rgba(192, 37, 43);">Atribuir responsável</h5>
            <button type="button" class="btn-close btn-close-white" onclick="OsGerenciamento.fecharModal('osAtribuirModal')"></button>
        </div>
        <div class="custom-modal-body p-4">
            <p class="text-muted small mb-3">OS #<span id="osAtribuirIdLabel"></span></p>
            <select id="osAtribuirSelect" class="form-select text-white mb-3"
                    style="background-color: #0b0b0b; border-color: #333;">
                <option value="">Selecione admin ou mecânico...</option>
            </select>
            <div id="osAtribuirErro" class="alert alert-danger d-none small"></div>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-outline-secondary w-50" onclick="OsGerenciamento.fecharModal('osAtribuirModal')">Cancelar</button>
                <button type="button" class="btn btn-primary w-50" id="osBtnConfirmarAtribuir">Confirmar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal alterar status -->
<div id="osStatusModal" class="custom-modal d-none">
    <div class="custom-modal-content rounded shadow card p-0" style="background-color: #111; border: 1px solid #222; max-width: 420px;">
        <div class="custom-modal-header border-bottom border-secondary p-3 d-flex justify-content-between align-items-center">
            <h5 class="m-0 fw-bold" style="color: rgba(192, 37, 43);">Alterar status</h5>
            <button type="button" class="btn-close btn-close-white" onclick="OsGerenciamento.fecharModal('osStatusModal')"></button>
        </div>
        <div class="custom-modal-body p-4">
            <p class="text-muted small mb-3">OS #<span id="osStatusIdLabel"></span></p>
            <select id="osStatusSelect" class="form-select text-white mb-3"
                    style="background-color: #0b0b0b; border-color: #333;">
                <option value="aberta">Aberta</option>
                <option value="em_andamento">Em andamento</option>
                <option value="aguardando_peca">Aguardando peça</option>
                <option value="concluida">Concluída</option>
                <option value="cancelada">Cancelada</option>
            </select>
            <div id="osStatusErro" class="alert alert-danger d-none small"></div>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-outline-secondary w-50" onclick="OsGerenciamento.fecharModal('osStatusModal')">Cancelar</button>
                <button type="button" class="btn btn-primary w-50" id="osBtnConfirmarStatus">Salvar</button>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/ordens_servico.js"></script>
