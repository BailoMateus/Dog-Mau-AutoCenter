steps:
  # 1. Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/backend-repo/fastapi-backend:$SHORT_SHA', 
      './backend'
    ]

  # 2. Push para o Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'us-central1-docker.pkg.dev/$PROJECT_ID/backend-repo/fastapi-backend:$SHORT_SHA'
    ]

  # 3. Deploy para o Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'backend-api'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/backend-repo/fastapi-backend:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances'
      - '${_INSTANCE_CONNECTION_NAME}'
      - '--update-env-vars'
      - 'SECRET_KEY=${_SECRET_KEY}'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/backend-repo/fastapi-backend:$SHORT_SHA'



options:
  logging: CLOUD_LOGGING_ONLY