<!doctype html>
<html lang="en" data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <title>Cadastro · Dog Mau Auto Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
  <body class="d-flex align-items-center py-4 bg-body-tertiary" id="login">
    <div class="dropdown position-fixed bottom-0 end-0 mb-3 me-3 bd-mode-toggle">
      <button
        class="btn btn-bd-primary py-2 dropdown-toggle d-flex align-items-center"
        id="bd-theme"
        type="button"
        aria-expanded="false"
        data-bs-toggle="dropdown"
        aria-label="Toggle theme (auto)"
      >
      
        <span class="visually-hidden" id="bd-theme-text">Toggle theme</span>
      </button>
      <ul
        class="dropdown-menu dropdown-menu-end shadow"
        aria-labelledby="bd-theme-text"
      >
        <li>
          <button
            type="button"
            class="dropdown-item d-flex align-items-center"
            data-bs-theme-value="light"
            aria-pressed="false"
          >
        
          </button>
        </li>
        <li>
          <button
            type="button"
            class="dropdown-item d-flex align-items-center"
            data-bs-theme-value="dark"
            aria-pressed="false"
          >
    
          </button>
        </li>
        <li>
          <button
            type="button"
            class="dropdown-item d-flex align-items-center active"
            data-bs-theme-value="auto"
            aria-pressed="true"
          >
      
          </button>
        </li>
      </ul>
    </div>
    <main class="form-signin w-100 m-auto">
      <form>
        <img
          class="mb-4 d-block mx-auto"
          src="assets/nome.png"
          alt=""
          height="72"
        />
        <h1 class="h3 mb-3 fw-normal text-center" style="color: rgba(192, 37, 43);">
          Crie sua conta
        </h1>

        <div class="form-floating">
          <input type="text" class="form-control" id="floatingNome" placeholder="Nome completo" />
          <label for="floatingNome">Nome completo</label>
        </div>

        <div class="form-floating mt-2">
          <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" />
          <label for="floatingInput">Email</label>
        </div>

        <div class="form-floating mt-2">
          <input type="text" class="form-control" id="floatingCpf" placeholder="CPF ou CNPJ" />
          <label for="floatingCpf">CPF / CNPJ</label>
        </div>

        <div class="form-floating mt-2">
          <input type="date" class="form-control" id="floatingNascimento" />
          <label for="floatingNascimento">Data de nascimento</label>
        </div>

        <div class="form-floating mt-2">
          <input type="password" class="form-control" id="floatingPassword" placeholder="Senha" />
          <label for="floatingPassword">Senha</label>
        </div>

        <div class="form-floating mt-2">
          <input type="password" class="form-control" id="floatingConfirmPassword" placeholder="Confirmar senha" />
          <label for="floatingConfirmPassword">Confirmar senha</label>
        </div>

        <hr class="my-4" />

        <h5 class="mb-3">Endereço</h5>

        <div class="form-floating">
          <input type="text" class="form-control" id="floatingCep" placeholder="CEP" />
          <label for="floatingCep">CEP</label>
        </div>

        <div class="form-floating mt-2">
          <input type="text" class="form-control" id="floatingRua" placeholder="Rua" />
          <label for="floatingRua">Rua</label>
        </div>

        <div class="form-floating mt-2">
          <input type="text" class="form-control" id="floatingNumero" placeholder="Número" />
          <label for="floatingNumero">Número</label>
        </div>

        <div class="form-check text-start my-3">
          <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault" />
          <label class="form-check-label" for="checkDefault">
            Lembre de mim
          </label>
        </div>

        <button class="btn btn-primary w-100 py-2" type="submit">
          Cadastrar
        </button>

        <script src="https://accounts.google.com/gsi/client" async defer></script>

<div id="g_id_onload" style="margin: 10px;"
     data-client_id="210021860949-6fvetnre6h7dp36clc6ipkg515b5d26f.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"
     data-type="standard">
</div>
        <p class="mt-5 mb-3 text-body-secondary">&copy; 2025–2026</p>
      </form>
    </main>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
