version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dogmau
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/database:/docker-entrypoint-initdb.d
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/dogmau
      - SECRET_KEY=secret_key_local_dev
      - DEBUG_LOG=True
    depends_on:
      - db
    volumes:
      - ./backend:/backend


volumes:
  pgdata:
